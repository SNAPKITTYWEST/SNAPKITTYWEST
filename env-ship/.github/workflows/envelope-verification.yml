name: Envelope Verification

on: [push, pull_request]

jobs:
  verify-envelopes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq openssl
      
      - name: Make scripts executable
        run: chmod +x bin/*.sh
      
      - name: Verify all envelopes
        run: |
          for env in envelopes/*.envelope; do
            [ -f "$env" ] || continue
            ./bin/env-ship.sh verify "$env" --verify-signature keys/ed25519_public.pem
          done
      
      - name: Validate schemas
        run: |
          for env in envelopes/*.envelope; do
            [ -f "$env" ] || continue
            ./bin/validate-envelope.sh "$env" schemas/env-ship.schema.json
          done
      
      - name: Check proof references
        run: |
          for env in envelopes/*.envelope; do
            [ -f "$env" ] || continue
            proof_ref=$(jq -r .proof_ref "$env")
            if [ "$proof_ref" = "null" ] || [ -z "$proof_ref" ]; then
              echo "WARNING: No proof ref in $env"
            fi
          done
