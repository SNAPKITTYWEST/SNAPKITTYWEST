name: swarm
on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'repo to fix (e.g. the-49th-call)'
        required: false
        default: 'the-49th-call'
      task:
        description: 'task override (leave blank for auto)'
        required: false
        default: ''
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: run agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          TARGET_REPO: ${{ github.event.inputs.repo || 'the-49th-call' }}
          OVERRIDE_TASK: ${{ github.event.inputs.task || '' }}
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess
          from pathlib import Path

          KEY    = os.environ["OPENROUTER_API_KEY"]
          PAT    = os.environ["PAT_TOKEN"]
          TARGET = os.environ.get("TARGET_REPO", "the-49th-call")
          TASK   = os.environ.get("OVERRIDE_TASK", "")
          MODEL  = "qwen/qwen-2.5-coder-32b-instruct"
          ORG    = "SNAPKITTYWEST"

          # clone target repo
          url = f"https://x-access-token:{PAT}@github.com/{ORG}/{TARGET}.git"
          subprocess.run(["git", "clone", "--depth=1", url, "target"], check=True)
          ROOT = Path("target")

          # scan for sorries and todos
          findings = []
          for pat, exts in [
              (r'\bsorry\b', ["*.lean"]),
              (r'raise NotImplementedError|#\s*TODO', ["*.py"]),
              (r'//\s*TODO|FIXME', ["*.rs","*.ts"]),
          ]:
              for ext in exts:
                  for f in ROOT.rglob(ext):
                      if any(x in str(f) for x in [".git",".lake","build","node_modules"]): continue
                      try:
                          txt = f.read_text(encoding="utf-8", errors="ignore")
                          for i, line in enumerate(txt.split("\n")):
                              if re.search(pat, line):
                                  findings.append({"file": str(f.relative_to(ROOT)), "line": i+1, "text": line.strip(), "path": f, "full": txt})
                      except: pass

          print(f"Found {len(findings)} items in {TARGET}")
          if not findings and not TASK:
              print("Nothing to do."); exit(0)

          if TASK:
              prompt = TASK
              target_file = None
          else:
              top = findings[0]
              prompt = f"Fix all sorry/TODO in this file. Output ONLY the complete corrected file, no markdown.\n\nFILE: {top['file']}\n\n{top['full'][:6000]}"
              target_file = top["path"]

          # call agent
          resp = requests.post("https://openrouter.ai/api/v1/chat/completions",
              headers={"Authorization": f"Bearer {KEY}", "HTTP-Referer": "https://snapkittywest.io"},
              json={"model": MODEL, "messages": [{"role":"user","content":prompt}], "temperature":0.1, "max_tokens":8192},
              timeout=300)
          result = resp.json()["choices"][0]["message"]["content"]

          # strip markdown fences
          m = re.search(r'```[\w]*\n(.*?)```', result, re.DOTALL)
          if m: result = m.group(1).strip()
          else:
              m2 = re.search(r'^(import |from |namespace |theorem |def )', result, re.MULTILINE)
              if m2: result = result[m2.start():]

          if not result or len(result) < 50:
              print("Empty result, skipping."); exit(0)

          if target_file:
              target_file.write_text(result, encoding="utf-8")
              print(f"Written: {target_file} ({len(result)} chars)")
          else:
              Path("target/agent_output.txt").write_text(result, encoding="utf-8")
              print("Written: agent_output.txt")

          # commit and push
          subprocess.run(["git", "config", "user.name", "SNAPKITTY-SWARM"], cwd="target", check=True)
          subprocess.run(["git", "config", "user.email", "swarm@snapkittywest.io"], cwd="target", check=True)
          subprocess.run(["git", "remote", "set-url", "origin", url], cwd="target", check=True)
          subprocess.run(["git", "add", "-A"], cwd="target", check=True)
          r = subprocess.run(["git", "diff", "--cached", "--quiet"], cwd="target")
          if r.returncode == 0:
              print("Nothing to commit.")
          else:
              import datetime
              ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
              subprocess.run(["git", "commit", "-m", f"swarm({TARGET}): {ts}"], cwd="target", check=True)
              subprocess.run(["git", "push", "origin", "HEAD"], cwd="target", check=True)
              print(f"Pushed to {TARGET}")
          EOF
